<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Samsung - Sistema de Matrices de Riesgo</title>

<style>

body{
    margin:0;
    font-family: "Segoe UI", Arial, sans-serif;
    background:#f5f7fb;
}

/* Barra superior estilo Samsung */
header{
    background:#1428A0;
    color:white;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    margin:0;
    font-size:22px;
    letter-spacing:1px;
}

/* menú */
nav a{
    color:white;
    margin-left:20px;
    text-decoration:none;
    font-size:14px;
}

nav a:hover{
    text-decoration:underline;
}

/* contenedor principal */
.container{
    max-width:1200px;
    margin:auto;
    padding:40px;
}

/* título */
.section-title{
    color:#1428A0;
    margin-bottom:25px;
}

/* galería de matrices */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(320px,1fr));
    gap:30px;
}

/* tarjeta */
.card{
    background:white;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* imagen */
.card img{
    width:100%;
    height:auto;
}

/* texto */
.card h3{
    padding:15px;
    margin:0;
    font-size:17px;
}

/* botón */
.card button{
    margin:15px;
    padding:10px 18px;
    background:#1428A0;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.card button:hover{
    background:#0C1A6B;
}

/* footer */
footer{
    text-align:center;
    padding:20px;
    color:#777;
}

</style>
</head>

<body>

<header>
<h1>SAMSUNG Risk Management</h1>

<nav>
<a href="#">Inicio</a>
<a href="#">Matrices</a>
<a href="#">Reportes</a>
<a href="#">Documentación</a>
</nav>
</header>

<div class="container">

<h2 class="section-title">Matrices de Riesgo</h2>

<div class="grid">

<div class="card">
<img src="imagenes/matriz_ambiental.png" alt="Matriz Ambiental">
<h3>Matriz de Riesgo Ambiental</h3>
<button>Ver Matriz</button>
</div>

<div class="card">
<img src="imagenes/matriz_laboral.png" alt="Matriz Laboral">
<h3>Matriz de Riesgo Laboral</h3>
<button>Ver Matriz</button>
</div>

<div class="card">
<img src="imagenes/matriz_seguridad.png" alt="Matriz Seguridad">
<h3>Matriz de Seguridad Industrial</h3>
<button>Ver Matriz</button>
</div>

<div class="card">
<img src="imagenes/matriz_operacional.png" alt="Matriz Operacional">
<h3>Matriz de Riesgo Operacional</h3>
<button>Ver Matriz</button>
</div>

</div>

</div>

<footer>
Sistema de Gestión de Riesgos – Diseño corporativo inspirado en Samsung
</footer>

</body>
</html>
